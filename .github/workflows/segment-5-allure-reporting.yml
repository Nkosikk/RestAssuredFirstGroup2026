# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SEGMENT 5: ALLURE REPORTING                                               ║
# ║  Topics: Installing CLI tools with npm, generating HTML reports, uploading ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# LEARNING OBJECTIVES:
#   1. Understand what Allure Report is and why it is useful
#   2. Learn how to install global CLI tools using npm in a workflow
#   3. Understand the two-step Allure process: results → report
#   4. Learn how allure-results (JSON) becomes allure-report (HTML)
#   5. Understand uploading HTML reports as downloadable artifacts
#
# HOW TO RUN:
#   Go to GitHub → Actions tab → "Segment 5: Allure Reporting"
#   → "Run workflow"
#
# PREREQUISITES:
#   - Segments 1-4 (basics, Java, tests, artifacts)
# ─────────────────────────────────────────────────────────────────────────────

name: "Segment 5: Allure Reporting"

on:
  workflow_dispatch:   # Manual trigger only

permissions:
  contents: read       # Minimum required permission — read repository files

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  allure:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Prerequisites from previous segments
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: |
          mvn clean install -DskipTests -q
          mvn -U test -Dsurefire.suiteXmlFiles=testng.xml || true
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ CONCEPT: THE ALLURE REPORTING FLOW                                 │
      # │                                                                    │
      # │   Tests run → allure-results/ (JSON files) → Allure CLI →         │
      # │   → allure-report/ (HTML website)                                  │
      # │                                                                    │
      # │   Step A: Tests generate JSON data in allure-results/              │
      # │   Step B: We install the Allure CLI tool                           │
      # │   Step C: Allure CLI converts JSON → beautiful HTML report         │
      # │   Step D: We upload the HTML report as a downloadable artifact     │
      # └────────────────────────────────────────────────────────────────────┘

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP A: VERIFY ALLURE RESULTS EXIST                                │
      # │                                                                    │
      # │ The Maven Allure plugin (configured in pom.xml) automatically     │
      # │ generates JSON result files during test execution.                 │
      # └────────────────────────────────────────────────────────────────────┘
      - name: "Verify: Allure results were generated"
        if: always()
        run: |
          echo "=== Allure Results (raw JSON test data) ==="
          if [ -d allure-results ]; then
            echo "✅ allure-results/ folder exists"
            echo "Files generated:"
            ls -la allure-results/
            echo ""
            echo "Number of result files: $(ls allure-results/ | wc -l)"
          else
            echo "⚠️ allure-results/ folder not found"
            echo "This means tests didn't generate Allure data."
            echo "Check that the Allure plugin is configured in pom.xml."
          fi

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP B: INSTALL ALLURE CLI                                         │
      # │                                                                    │
      # │ "npm install -g" installs a package GLOBALLY on the runner.        │
      # │ This makes the "allure" command available from anywhere.           │
      # │                                                                    │
      # │ allure-commandline is the official Allure Report CLI tool.         │
      # │ It takes JSON results and generates an interactive HTML website.   │
      # └────────────────────────────────────────────────────────────────────┘
      - name: Install Allure CLI
        if: always()
        run: |
          echo "Installing Allure CLI globally..."
          npm install -g allure-commandline
          echo ""
          echo "=== Verify Allure CLI installation ==="
          allure --version

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP C: GENERATE ALLURE HTML REPORT                                │
      # │                                                                    │
      # │ Command: allure generate allure-results --clean -o allure-report   │
      # │                                                                    │
      # │ Breaking down the command:                                         │
      # │   allure generate     → Generate HTML report                       │
      # │   allure-results      → Input: folder with JSON test results       │
      # │   --clean             → Delete previous report before generating   │
      # │   -o allure-report    → Output: folder for the HTML report         │
      # │                                                                    │
      # │ The generated allure-report/ folder contains:                      │
      # │   - index.html (main report page)                                  │
      # │   - CSS, JS, and data files for the interactive UI                 │
      # │   - Charts, graphs, and detailed test information                  │
      # └────────────────────────────────────────────────────────────────────┘
      - name: Generate Allure HTML Report
        if: always()
        run: |
          echo "Generating Allure HTML report..."
          allure generate allure-results --clean -o allure-report
          echo ""
          echo "=== Generated Report Contents ==="
          ls -la allure-report/
          echo ""
          echo "✅ Allure report generated! Look for index.html"

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP D: UPLOAD THE HTML REPORT AS AN ARTIFACT                      │
      # │                                                                    │
      # │ We upload the entire allure-report/ folder so anyone can           │
      # │ download it, unzip it, and open index.html in their browser.       │
      # └────────────────────────────────────────────────────────────────────┘
      - name: "Upload Artifact: Allure HTML Report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: How to view the Allure report
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  📊 HOW TO VIEW THE ALLURE REPORT"
          echo "════════════════════════════════════════════════════════"
          echo ""
          echo "  1. Download the 'allure-report' artifact (bottom of run page)"
          echo "  2. Unzip the downloaded file"
          echo "  3. Open 'index.html' in your web browser"
          echo ""
          echo "  OR use Allure CLI locally:"
          echo "     allure open allure-report/"
          echo ""
          echo "════════════════════════════════════════════════════════"

# ─────────────────────────────────────────────────────────────────────────────
# STUDENT EXERCISES:
#   1. Download the allure-report artifact and open index.html — explore the UI
#   2. What happens if allure-results/ is empty? Try generating from empty folder
#   3. Look at the JSON files in allure-results/ — what data do they contain?
#   4. Try: allure serve allure-results (locally) — how is it different?
# ─────────────────────────────────────────────────────────────────────────────
