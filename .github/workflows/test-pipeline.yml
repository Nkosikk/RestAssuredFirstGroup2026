# GitHub Actions Workflow for Automated REST API Testing
# This pipeline runs TestNG tests, generates Allure reports, and sends results via email
name: REST Assured API Tests

# Workflow triggers
on:
  push:
    branches: [ main ]          # Run on push to main branch
  pull_request:
    branches: [ main ]          # Run on pull requests to main
  workflow_dispatch:            # Allow manual trigger from GitHub UI

# Global environment variables
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node 24 for compatibility

# Job definitions
jobs:
  test:
    runs-on: ubuntu-latest      # Use Ubuntu runner
    timeout-minutes: 30         # Set overall job timeout

    steps:
      # Step 1: Clone the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Verify Node.js version (debugging/verification)
      - name: Check Node version
        run: node -v

      # Step 3: Install Java 21 (required for Maven and TestNG)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven              # Cache Maven dependencies for faster builds

      # Step 4: Build the project (compile code, skip running tests)
      - name: Build project
        run: mvn clean install -DskipTests -q #mvn clean test

      # Step 5: Run TestNG tests from testng.xml configuration file
      - name: Run TestNG suite (testng.xml)
        timeout-minutes: 15
        run: mvn -U test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          # Pass database credentials from GitHub secrets
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # Step 6: Display generated test artifacts (for debugging)
      # This runs regardless of test results (if: always())
      - name: Show generated folders
        if: always()
        run: |
          echo "Project root:"
          ls -la
          echo "Target folder:"
          ls -la target || true
          echo "Allure results folder:"
          ls -la allure-results || true

      # Step 7: Upload TestNG reports to GitHub artifacts
      # Makes test results available for download from GitHub Actions UI
      - name: Upload TestNG results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # Step 8: Upload Allure test results JSON files
      # These JSON files are used to generate the Allure HTML report
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      # Step 9: Install Allure CLI globally using npm
          # Required to generate HTML reports from test results
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      # Step 10: Generate Allure HTML report from test results
      # Creates a beautiful, interactive test report
      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # Step 11: Extract test results summary from TestNG XML
      # Parses pass/fail/skip counts to embed in the email body
      - name: Extract Test Summary
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -oE 'total="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            PASSED=$(grep -oE 'passed="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            FAILED=$(grep -oE 'failed="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            SKIPPED=$(grep -oE 'skipped="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            echo "TEST_TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
            echo "TEST_PASSED=${PASSED:-0}" >> $GITHUB_ENV
            echo "TEST_FAILED=${FAILED:-0}" >> $GITHUB_ENV
            echo "TEST_SKIPPED=${SKIPPED:-0}" >> $GITHUB_ENV
          else
            echo "TEST_TOTAL=N/A" >> $GITHUB_ENV
            echo "TEST_PASSED=N/A" >> $GITHUB_ENV
            echo "TEST_FAILED=N/A" >> $GITHUB_ENV
            echo "TEST_SKIPPED=N/A" >> $GITHUB_ENV
          fi

      # Step 12: Upload generated Allure HTML report as artifact
      # Makes the HTML report downloadable from GitHub Actions UI
      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      # Step 13: Send test report via email using Gmail SMTP
      # Notifies team of test results with links to the Allure report
      # NOTE: Gmail blocks HTML/ZIP attachments, so we use links instead
      - name: Send Email with Allure Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP server configuration
          server_address: smtp.gmail.com                    # Gmail SMTP server
          server_port: 587                                  # TLS secure connection port
          # Authentication credentials (stored in GitHub secrets for security)
          username: ${{ secrets.EMAIL_USERNAME }}           # Gmail account email
          password: ${{ secrets.EMAIL_PASSWORD }}           # Gmail app-specific password
          # Email content
          subject: Rest Assured Automation Test Results - Allure Report for 1st Group  # Email subject line
          to: fitness.seed@gmail.com                        # Recipient email address
          from: ${{ secrets.EMAIL_USERNAME }}               # Sender email address
          # Message body with test execution details and test results summary
          body: |
            Hi Team,
            
            ═══════════════════════════════════════════════════════════
            TEST EXECUTION REPORT
            ═══════════════════════════════════════════════════════════
            
            Repository:    ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Commit:        ${{ github.sha }}
            Run Number:    ${{ github.run_number }}
            Triggered by:  ${{ github.actor }}
            Status:        COMPLETED
            
            ───────────────────────────────────────────────────────────
            TEST RESULTS SUMMARY
            ───────────────────────────────────────────────────────────
            
            Total Tests:   ${{ env.TEST_TOTAL }}
            ✅ Passed:      ${{ env.TEST_PASSED }}
            ❌ Failed:      ${{ env.TEST_FAILED }}
            ⏭️ Skipped:     ${{ env.TEST_SKIPPED }}
            
            ═══════════════════════════════════════════════════════════
            
            📦 Download Artifacts from GitHub Actions:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ═══════════════════════════════════════════════════════════
            
            Kind Regards,
            Team Lead
            
            ═══════════════════════════════════════════════════════════

          # Attachment: TestNG emailable report (self-contained HTML with test results)
          attachments: target/surefire-reports/emailable-report.html

