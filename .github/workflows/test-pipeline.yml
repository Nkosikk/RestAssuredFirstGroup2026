name: REST Assured API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ✅ Force Node.js 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Verify Node version (debugging / confirmation)
      - name: Check Node version
        run: node -v

      # ✅ Setup Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ✅ Build project (skip tests for faster dependency resolution)
      - name: Build project
        run: mvn clean install -DskipTests -q

      # ✅ Run tests (parallel execution)
      - name: Run tests (Parallel Execution)
        timeout-minutes: 15
        run: mvn -U clean test -DthreadCount=2
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ✅ Upload TestNG results
      - name: Upload TestNG results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # ✅ Upload Allure raw results
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      # ✅ Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # ✅ Generate Allure HTML report
      - name: Generate Allure Report
        run: allure generate target/allure-results --clean -o target/allure-report

      # ✅ Upload Allure HTML report
      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/