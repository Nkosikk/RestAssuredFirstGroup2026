name: REST Assured API Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node version
        run: node -v

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project and run tests
        run: mvn clean install -DskipTests -q

      - name: Run TestNG suite (testng.xml)
        timeout-minutes: 15
        run: mvn -U test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Show generated folders
        if: always()
        run: |
            echo "Project root:"
            ls -la
            echo "Target folder:"
            ls -la target || true
            echo "Allure results folder:"
            ls -la allure-results || true


      - name: Upload TestNG results
        if: always()
        uses: actions/upload-artifact@v4
        with:
         name: test-results
         path: target/surefire-reports/
         retention-days: 30

      - name: Upload Allure result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Extract Test Summary
        if: always()
        run: |
          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -oE 'total="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            PASSED=$(grep -oE 'passed="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            FAILED=$(grep -oE 'failed="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            SKIPPED=$(grep -oE 'skipped="[0-9]+"' target/surefire-reports/testng-results.xml | head -1 | grep -oE '[0-9]+')
            echo "TEST_TOTAL=${TOTAL:-0}" >> $GITHUB_ENV
            echo "TEST_PASSED=${PASSED:-0}" >> $GITHUB_ENV
            echo "TEST_FAILED=${FAILED:-0}" >> $GITHUB_ENV
            echo "TEST_SKIPPED=${SKIPPED:-0}" >> $GITHUB_ENV
          else
            echo "TEST_TOTAL=N/A" >> $GITHUB_ENV
            echo "TEST_PASSED=N/A" >> $GITHUB_ENV
            echo "TEST_FAILED=N/A" >> $GITHUB_ENV
            echo "TEST_SKIPPED=N/A" >> $GITHUB_ENV
          fi

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
         name: allure-report
         path: allure-report/
         retention-days: 30
