name: REST Assured API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Node version
        run: node -v

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean install -DskipTests -q

      - name: Run TestNG suite (testng.xml)
        timeout-minutes: 15
        run: mvn -U test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Show generated folders
        if: always()
        run: |
          echo "Project root:"
          ls -la
          echo "Target folder:"
          ls -la target || true
          echo "Allure results folder:"
          ls -la allure-results || true

      - name: Upload TestNG results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      # Step 5: Send the report by email
      - name: Send Email with Extent Report
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP server used to send the email
          server_address: smtp.gmail.com
          # SMTP port for secure TLS email sending
          server_port: 587
          # Email username stored securely in GitHub secrets
          username: ${{ secrets.EMAIL_USERNAME }}
          # Email password or app password stored securely in GitHub secrets
          password: ${{ secrets.EMAIL_PASSWORD }}
          # Subject line of the email
          subject: Automation Test Results - Allure Report for 1st Group
          # Recipient email address
          to: fitness.seed@gmail.com
          # Sender email address
          from: ${{ secrets.EMAIL_USERNAME }}
          # Message body in the email (supports plain text or HTML)
          body: |
            Hi Team,
            
            ═══════════════════════════════════════════════════════════
            TEST EXECUTION REPORT
            ═══════════════════════════════════════════════════════════
            
            Repository:    ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Commit:        ${{ github.sha }}
            Run Number:    ${{ github.run_number }}
            Triggered by:  ${{ github.actor }}
            Status:        COMPLETED
            
            ═══════════════════════════════════════════════════════════
            
            Please find the Allure test report attached to this email.
            
            For more details, visit:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Kind Regards,
            Avela Team Lead
            
            ═══════════════════════════════════════════════════════════

          # Attach the generated report file to the email
          attachments: allure-report/index.html