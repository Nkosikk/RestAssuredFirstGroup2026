# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  SEGMENT 3: RUNNING TESTNG TESTS                                          ║
# ║  Topics: Running tests, testng.xml, GitHub Secrets, step timeouts          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# LEARNING OBJECTIVES:
#   1. Understand how to run TestNG tests using Maven
#   2. Learn what testng.xml is and how it configures the test suite
#   3. Understand GitHub Secrets — how to safely pass sensitive data
#   4. Learn about step-level timeouts (different from job-level)
#   5. Understand the difference between "mvn install" and "mvn test"
#
# HOW TO RUN:
#   Go to GitHub → Actions tab → "Segment 3: Running TestNG Tests"
#   → "Run workflow"
#
# PREREQUISITES:
#   - Segment 1 (workflow basics)
#   - Segment 2 (Java setup and build)
#   - GitHub Secrets configured: DB_URL, DB_USERNAME, DB_PASSWORD
#     (Go to: Settings → Secrets and variables → Actions → New repository secret)
# ─────────────────────────────────────────────────────────────────────────────

name: "Segment 3: Running TestNG Tests"

on:
  workflow_dispatch:   # Manual trigger only

permissions:
  contents: read       # Minimum required permission — read repository files

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # Job-level timeout: cancel entire job after 30 min

    steps:
      # Steps from previous segments (checkout + Java setup + build)
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project (compile only)
        run: mvn clean install -DskipTests -q

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ NEW CONCEPT: VIEWING testng.xml BEFORE RUNNING TESTS               │
      # │                                                                    │
      # │ testng.xml defines WHICH tests to run and in what order.           │
      # │ Let's print it so we can see the test configuration.               │
      # └────────────────────────────────────────────────────────────────────┘
      - name: Display testng.xml configuration
        run: |
          echo "=== testng.xml (Test Suite Configuration) ==="
          cat testng.xml
          echo ""
          echo "This file tells TestNG which test classes/packages to run."

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP: RUN TESTNG TESTS                                             │
      # │                                                                    │
      # │ Command: mvn -U test -Dsurefire.suiteXmlFiles=testng.xml           │
      # │                                                                    │
      # │ Breaking down the command:                                         │
      # │   mvn                              → Run Maven                     │
      # │   -U                               → Force update of dependencies  │
      # │                                      (check for newer versions)    │
      # │   test                             → Run the "test" phase only     │
      # │   -Dsurefire.suiteXmlFiles=testng.xml → Tell Surefire plugin to   │
      # │                                         use testng.xml config      │
      # │                                                                    │
      # │ STEP-LEVEL TIMEOUT:                                                │
      # │   "timeout-minutes: 15" applies to THIS step only (not the job).  │
      # │   If tests hang or take too long, this step fails after 15 min.   │
      # │                                                                    │
      # │ GITHUB SECRETS (env:):                                             │
      # │   Secrets are encrypted values stored in GitHub settings.          │
      # │   They are injected as environment variables at runtime.           │
      # │   ⚠️  Secrets are NEVER printed in logs — GitHub masks them.       │
      # │                                                                    │
      # │   ${{ secrets.DB_URL }} → GitHub looks up the secret named         │
      # │   "DB_URL" and injects its value into the DB_URL env variable.    │
      # └────────────────────────────────────────────────────────────────────┘
      - name: Run TestNG suite (testng.xml)
        timeout-minutes: 15      # Step-level timeout (separate from job timeout)
        run: mvn -U test -Dsurefire.suiteXmlFiles=testng.xml
        env:
          # These secrets must be configured in GitHub repository settings
          # Settings → Secrets and variables → Actions → New repository secret
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # ┌────────────────────────────────────────────────────────────────────┐
      # │ STEP: SHOW TEST RESULTS                                            │
      # │                                                                    │
      # │ After tests run, Maven generates reports in target/surefire-reports│
      # │ Let's peek at the results.                                         │
      # │                                                                    │
      # │ "if: always()" means this step runs even if the tests FAILED.     │
      # │ Without "if: always()", steps after a failure are SKIPPED.         │
      # └────────────────────────────────────────────────────────────────────┘
      - name: Show test results summary
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/testng-results.xml ]; then
            echo "TestNG results file found!"
            head -5 target/surefire-reports/testng-results.xml
          else
            echo "⚠️ No TestNG results file found (tests may not have run)"
          fi
          echo ""
          echo "=== Surefire Reports Directory ==="
          ls -la target/surefire-reports/ || echo "No surefire-reports directory"

# ─────────────────────────────────────────────────────────────────────────────
# STUDENT EXERCISES:
#   1. What happens if you DON'T set the DB_URL secret? Run and observe.
#   2. Remove "timeout-minutes: 15" from the test step — what is the default?
#   3. Remove "if: always()" from "Show test results" — fail a test and see
#      if that step runs.
#   4. Try changing the suite file: -Dsurefire.suiteXmlFiles=another.xml
#      — what error do you get?
# ─────────────────────────────────────────────────────────────────────────────
